version: '3.8'

services:
  # 1. O Cofre de Segredos (Hardware Security Module em Software)
  vault:
    image: hashicorp/vault:1.15
    container_name: lexgrid_vault
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "lexgrid_temp_dev_token" # Apenas para o setup inicial
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # 2. Banco Relacional (PostgreSQL Hardened)
  postgres:
    image: postgres:16-alpine
    container_name: lexgrid_postgres
    restart: always
    environment:
      POSTGRES_USER: lexadmin
      # Senha mantida igual para não quebrar a esteira (test_db.py e repository)
      POSTGRES_PASSWORD: lexpassword_secure_2026
      POSTGRES_DB: lexgrid_core
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    # Capacidades mínimas estritas apenas para o Postgres funcionar
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true

  # 3. Banco Vetorial (Qdrant Hardened)
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: lexgrid_qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # 4. Memória Curta: Cache de Sessão de Alta Performance (Dragonfly Hardened)
  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: lexgrid_dragonfly
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    # Dragonfly aceita os mesmos comandos do Redis, mas roda muito mais rápido
    command: [--requirepass=dragonfly_secure_pass]
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # 5. Inteligência Cognitiva: Modelos LLM Locais (Ollama Hardened)
  ollama:
    image: ollama/ollama:latest
    container_name: lexgrid_ollama
    restart: always
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  lexgrid_secure_net:
    driver: bridge
    # Força a rede a ser isolada e não roteável para a internet externa sem proxy
    internal: true

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
