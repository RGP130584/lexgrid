name: CI - Quality & Core Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Static Analysis & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Layer 1 Quality Pipeline
        run: python scripts/quality/run_quality_pipeline.py

      - name: Run PyTest & Coverage
        run: |
          pytest tests/ --cov=backend/ --cov=scripts/ --cov-report=xml
          
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml