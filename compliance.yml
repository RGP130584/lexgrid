name: Compliance & Governance

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  compliance-audit:
    name: LGPD & License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Check Open Source Licenses
        run: |
          pip install pip-licenses
          pip-licenses --format=markdown --with-system --output-file=compliance/policies/licenses.md