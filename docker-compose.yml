services:
  # 0. API Backend: LexGrid Core App
  lexgrid_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexgrid_api
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
    networks:
      - lexgrid_secure_net
    depends_on:
      dragonfly:
        condition: service_healthy

  # 1. O Cofre de Segredos (Hardware Security Module em Software)
  vault:
    image: hashicorp/vault:1.15
    container_name: lexgrid_vault
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "lexgrid_temp_dev_token" # Apenas para o setup inicial
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /vault/logs
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # 2. Banco Relacional (PostgreSQL Hardened) 
  postgres:
    image: postgres:16-alpine
    container_name: lexgrid_postgres
    restart: always
    environment:
      POSTGRES_USER: lexadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexpassword_secure_2026}
      POSTGRES_DB: lexgrid_core
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - lexgrid_backups:/backups
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    # Capacidades mínimas estritas apenas para o Postgres funcionar
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexadmin -d lexgrid_core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Banco Vetorial (Qdrant Hardened)
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: lexgrid_qdrant
    restart: always
    ports:
      - "127.0.0.1:${QDRANT_PORT:-56333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-56334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - lexgrid_snapshots:/snapshots
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 4. Memória Curta: Cache de Sessão de Alta Performance (Dragonfly Hardened)
  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: lexgrid_dragonfly
    restart: always
    ports:
      - "127.0.0.1:${DRAGONFLY_PORT:-56379}:6379"
    command: [--requirepass=dragonfly_secure_pass]
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a dragonfly_secure_pass ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  lexgrid_secure_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  qdrant_data:
  lexgrid_backups:
  lexgrid_snapshots: