services:
  # 0. API Backend: LexGrid Core App
  lexgrid_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexgrid_api
    restart: always
    ports:
      - "${LEXGRID_API_PORT:-8003}:8000"
    volumes:
      - .:/app
    environment:
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      dragonfly:
        condition: service_healthy

  # 1. O Cofre de Segredos (Hardware Security Module em Software)
  vault:
    image: hashicorp/vault:1.15
    container_name: lexgrid_vault
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "lexgrid_temp_dev_token" # Apenas para o setup inicial
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8203}:8200"
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /vault/logs
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # 2. Banco Relacional (PostgreSQL Hardened) 
  postgres:
    image: postgres:16-alpine
    container_name: lexgrid_postgres
    restart: always
    environment:
      POSTGRES_USER: lexadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexpassword_secure_2026}
      POSTGRES_DB: lexgrid_core
    ports:
      - "${POSTGRES_PORT:-55433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - lexgrid_backups:/backups
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    # Capacidades mínimas estritas apenas para o Postgres funcionar
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexadmin -d lexgrid_core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Banco Vetorial (Qdrant Hardened)
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: lexgrid_qdrant
    restart: always
    ports:
      - "${QDRANT_PORT:-56333}:6333"
      - "${QDRANT_GRPC_PORT:-56334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - lexgrid_snapshots:/snapshots
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 4. Memória Curta: Cache de Sessão de Alta Performance (Dragonfly Hardened)
  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: lexgrid_dragonfly
    restart: always
    ports:
      - "${DRAGONFLY_PORT:-56379}:6379"
    command: [--requirepass=dragonfly_secure_pass]
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a dragonfly_secure_pass ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 5. Motor de IA Local (Ollama Hardened)
  ollama:
    image: ollama/ollama:latest
    container_name: lexgrid_ollama
    restart: always
    ports:
      - "${OLLAMA_PORT:-51434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── ATUALIZADOR DE MODELOS DA IA (Auto-pull) ─────────────────
  # Executado uma única vez após o Ollama subir e ficar saudável.
  # Baixa e atualiza os modelos Qwen 3.6 e Nomic Embed Text automaticamente.
  ollama-model-puller:
    image: ollama/ollama:latest
    container_name: lexgrid_ollama_puller
    restart: "no"
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      sh -c "
      echo 'Aguardando o serviço Ollama iniciar...'
      until curl -sf http://ollama:11434/ > /dev/null; do sleep 5; done
      echo 'Ollama online! Baixando/atualizando modelo Qwen 3.6...'
      ollama pull qwen3.6
      echo 'Baixando/atualizando modelo de embeddings nomic-embed-text...'
      ollama pull nomic-embed-text
      echo 'Modelos atualizados com sucesso!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - lexgrid_secure_net

  # 6. Frontend Cognitivo (Next.js - LexGrid Web)
  lexgrid_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexgrid_frontend
    restart: always
    ports:
      - "${LEXGRID_FRONTEND_PORT:-3003}:3000"
    networks:
      - lexgrid_secure_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  lexgrid_secure_net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  lexgrid_backups:
  lexgrid_snapshots:
  ollama_data: