name: Observability Validation

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  tracing-check:
    name: Logging & Tracing Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Logger Setup
        run: |
          python -c "from scripts.shared.logger import get_logger; logger = get_logger('CI'); logger.info('Observability check pass')"